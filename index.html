<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago | Fresas Maracay</title>
    <style>
        /* Estilos Dark Mode - Protección de vista */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
        }

        h2 {
            text-align: center;
            color: #ff4081;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #bbb;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2c2c2c;
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff4081;
            background-color: #333;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        #mensaje {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
        }

        .success { background-color: #1b5e20; color: #fff; display: block !important; border: 1px solid #2e7d32; }
        .error { background-color: #b71c1c; color: #fff; display: block !important; border: 1px solid #c62828; }
        .loading { background-color: #0d47a1; color: #fff; display: block !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>🍓 Registrar Pago</h2>
    
    <div class="form-group">
        <label>Banco Emisor (Cliente):</label>
        <select id="bancoEmisor">
            <option value="Banesco">Banesco</option>
            <option value="BDV">Banco de Venezuela</option>
            <option value="Mercantil">Mercantil</option>
            <option value="Provincial">Provincial</option>
            <option value="Otros">Otros Bancos</option>
        </select>
    </div>

    <div class="form-group">
        <label>Banco Receptor (Tu cuenta):</label>
        <select id="bancoReceptor">
            <option value="Banesco-Principal">Mi Banesco</option>
            <option value="BDV-Principal">Mi Banco de Venezuela</option>
        </select>
    </div>

    <div class="form-group">
        <label>Celular del Pago Móvil (Origen):</label>
        <input type="tel" id="telefono" placeholder="Ej: 04121234567" required>
    </div>

    <div class="form-group">
        <label>Número de Referencia (6-12 dígitos):</label>
        <input type="number" id="referencia" placeholder="Ej: 12345678" required>
    </div>

    <div class="form-group">
        <label>Monto Pagado (Bs):</label>
        <input type="number" step="0.01" id="monto" placeholder="Ej: 1500.00" required>
    </div>

    <button onclick="enviarPago()">VALIDAR PAGO</button>

    <div id="mensaje"></div>
</div>

<script>
    function enviarPago() {
        const urlScript = "TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI";
        
        const ref = document.getElementById('referencia').value;
        const monto = document.getElementById('monto').value;
        const tel = document.getElementById('telefono').value;
        const emisor = document.getElementById('bancoEmisor').value;
        const receptor = document.getElementById('bancoReceptor').value;
        const msgDiv = document.getElementById('mensaje');

        if (!ref || !monto || !tel) {
            msgDiv.className = "error";
            msgDiv.innerHTML = "❌ Por favor completa los datos (Teléfono, Referencia y Monto)";
            return;
        }

        msgDiv.className = "loading";
        msgDiv.innerHTML = "⏳ Enviando registro al sistema...";

        // Formato: referencia,monto,emisor,receptor,telefono
        const datosStr = `${ref},${monto},${emisor},${receptor},${tel}`;

        fetch(urlScript, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ referencia: datosStr })
        })
        .then(() => {
            msgDiv.className = "success";
            msgDiv.innerHTML = "✅ Pago enviado con éxito. En breve será verificado.";
            // Limpiar campos importantes
            document.getElementById('referencia').value = "";
            document.getElementById('monto').value = "";
            document.getElementById('telefono').value = "";
        })
        .catch(error => {
            msgDiv.className = "error";
            msgDiv.innerHTML = "❌ Error de conexión. Intente de nuevo.";
            console.error(error);
        });
    }
</script>

</body>
</html>
