<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago | Fresas Maracay</title>
    <style>
        /* Estilos Dark Mode - Protección de vista */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
        }

        h2 {
            text-align: center;
            color: #ff4081;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #bbb;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2c2c2c;
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff4081;
            background-color: #333;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #mensaje {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
        }

        .success { background-color: #1b5e20; color: #fff; display: block !important; border: 1px solid #2e7d32; }
        .error { background-color: #b71c1c; color: #fff; display: block !important; border: 1px solid #c62828; }
        .loading { background-color: #0d47a1; color: #fff; display: block !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>🍓 Registrar Pago</h2>
    
    <div class="form-group">
        <label>Banco Emisor (Cliente):</label>
        <select id="bancoEmisor">
            <option value="Banesco">Banesco</option>
            <option value="BDV">Banco de Venezuela</option>
            <option value="Mercantil">Mercantil</option>
            <option value="Provincial">Provincial</option>
            <option value="Otros">Otros Bancos</option>
        </select>
    </div>

    <div class="form-group">
        <label>Banco Receptor (Cuenta Destino):</label>
        <select id="bancoReceptor">
            <option value="Banesco-Principal">Mi Banesco</option>
            <option value="Provincial-Principal">Mi Provincial</option>
            <option value="BDV-Principal">Mi Banco de Venezuela</option>
        </select>
    </div>

    <div class="form-group">
        <label>Celular del Pago (Origen):</label>
        <input type="tel" id="telefono" placeholder="Ej: 04121234567" required>
    </div>

    <div class="form-group">
        <label>Referencia (6-12 dígitos):</label>
        <input type="number" id="referencia" placeholder="Ej: 12345678" required>
    </div>

    <div class="form-group">
        <label>Monto Pagado (Bs):</label>
        <input type="number" step="0.01" id="monto" placeholder="Ej: 1500.00" required>
    </div>

    <button id="btnValidar" onclick="enviarPago()">VALIDAR PAGO</button>

    <div id="mensaje"></div>
</div>

<script>
    async function enviarPago() {
        // La URL de Google solo se usa ahora para notificar el número de teléfono al Excel
        const urlScriptGoogle = "https://script.google.com/macros/s/AKfycbyGi8ZFesRZWCW6FrHtqtiJs-i5imwTWmBPLx4R3jnQ3G7ii4SlTw5Jt5ENGTBN64DN7A/exec";
        
        const refInput = document.getElementById('referencia').value.trim();
        const montoInput = document.getElementById('monto').value.trim();
        const telInput = document.getElementById('telefono').value.trim();
        const msgDiv = document.getElementById('mensaje');
        const btn = document.getElementById('btnValidar');

        if (!refInput || !montoInput || !telInput) {
            msgDiv.className = "error";
            msgDiv.innerHTML = "❌ Completa Teléfono, Referencia y Monto.";
            return;
        }

        msgDiv.className = "loading";
        msgDiv.innerHTML = "⏳ Verificando pago...";
        btn.disabled = true;

        try {
            // 1. LEER LA BASE DE DATOS LOCAL (pagos.json en GitHub)
            // Agregamos un timestamp (?t=) para evitar que el navegador guarde una copia vieja
            const response = await fetch('pagos.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('No se pudo leer la base de datos');
            
            const pagos = await response.json();

            // 2. BUSCAR EL PAGO
            const pagoEncontrado = pagos.find(p => {
                const refIgual = p.ref.toString().trim() === refInput;
                // Comparamos montos normalizando puntos y comas
                const montoHoja = parseFloat(p.monto.toString().replace(/\./g, '').replace(',', '.'));
                const montoUser = parseFloat(montoInput.replace(/\./g, '').replace(',', '.'));
                return refIgual && Math.abs(montoHoja - montoUser) < 0.01;
            });

            if (pagoEncontrado) {
                msgDiv.className = "success";
                msgDiv.innerHTML = "✅ ¡PAGO VERIFICADO! Pedido en proceso. 🍓";
                
                // 3. NOTIFICAR AL EXCEL (Opcional, para marcar como Verificado Web)
                const datosNotificar = `${refInput},${montoInput},,,${telInput}`;
                fetch(`${urlScriptGoogle}?referencia=${encodeURIComponent(datosNotificar)}`, { mode: 'no-cors' });

                // Limpiar campos
                document.getElementById('referencia').value = "";
                document.getElementById('monto').value = "";
            } else {
                msgDiv.className = "error";
                msgDiv.innerHTML = "❌ PAGO NO ENCONTRADO. Reintente en un momento.";
            }
        } catch (error) {
            msgDiv.className = "error";
            msgDiv.innerHTML = "❌ Error técnico de conexión local.";
            console.error("Detalle:", error);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
