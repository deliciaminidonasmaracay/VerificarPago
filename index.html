<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago | Fresas Maracay</title>
    <style>
        /* Estilos Dark Mode para proteger la vista */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }

        h2 {
            text-align: center;
            color: #ff4081; /* Color fresa */
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #bbb;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2c2c2c;
            color: #fff;
            box-sizing: border-box; /* Evita que el padding ensanche el input */
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff4081;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #c2185b;
        }

        #mensaje {
            margin-top: 20px;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .success { background-color: #2e7d32; color: white; display: block !important; }
        .error { background-color: #c62828; color: white; display: block !important; }
        .loading { background-color: #1565c0; color: white; display: block !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>🍓 Registrar Pago</h2>
    
    <label>Banco Emisor (De donde sale el dinero):</label>
    <select id="bancoEmisor">
        <option value="Banesco">Banesco</option>
        <option value="BDV">Banco de Venezuela</option>
        <option value="Mercantil">Mercantil</option>
        <option value="Provincial">Provincial</option>
        <option value="BNC">BNC</option>
        <option value="Bancamiga">Bancamiga</option>
        <option value="Otros">Otros Bancos</option>
    </select>

    <label>Banco Receptor (A qué cuenta pagaste):</label>
    <select id="bancoReceptor">
        <option value="Banesco-Principal">Mi Banesco</option>
        <option value="BDV-Principal">Mi Banco de Venezuela</option>
    </select>

    <label>Número de Referencia (Últimos 6-12 dígitos):</label>
    <input type="number" id="referencia" placeholder="Ej: 12345678" required>

    <label>Monto del Pago (Bs):</label>
    <input type="number" step="0.01" id="monto" placeholder="Ej: 1500.00" required>

    <button onclick="enviarPago()">VALIDAR PAGO</button>

    <div id="mensaje"></div>
</div>

<script>
    function enviarPago() {
        const urlScript = "TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI";
        
        const ref = document.getElementById('referencia').value;
        const monto = document.getElementById('monto').value;
        const emisor = document.getElementById('bancoEmisor').value;
        const receptor = document.getElementById('bancoReceptor').value;
        const msgDiv = document.getElementById('mensaje');

        if (!ref || !monto) {
            msgDiv.className = "error";
            msgDiv.innerHTML = "❌ Por favor completa todos los campos";
            return;
        }

        msgDiv.className = "loading";
        msgDiv.innerHTML = "⏳ Verificando pago...";

        // Creamos la cadena de texto separada por comas para tu Script
        const datos = `${ref},${monto},${emisor},${receptor}`;

        fetch(urlScript, {
            method: 'POST',
            mode: 'no-cors', // Para evitar errores de seguridad de Google
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ referencia: datos })
        })
        .then(() => {
            msgDiv.className = "success";
            msgDiv.innerHTML = "✅ Pago enviado con éxito. En breve será validado por el sistema.";
            // Limpiar formulario
            document.getElementById('referencia').value = "";
            document.getElementById('monto').value = "";
        })
        .catch(error => {
            msgDiv.className = "error";
            msgDiv.innerHTML = "❌ Error de conexión al servidor.";
            console.error(error);
        });
    }
</script>

</body>
  </html>
